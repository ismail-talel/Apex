<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Apex">
  <defs>
    <linearGradient id="apex-bg" x1="10" y1="6" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4f46e5"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="apex-peak" x1="32" y1="12" x2="32" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="apex-glow" x1="32" y1="8" x2="32" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6ee7b7"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="apex-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="17" fill="url(#apex-bg)"/>
  <rect x="4" y="4" width="56" height="56" rx="17" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Sommet / lettre A -->
  <path
    d="M32 13 L17 47 H24.2 L27.2 39.2 H36.8 L39.8 47 H47 L32 13 Z M30.2 33.2 L32 28.2 L33.8 33.2 H30.2 Z"
    fill="url(#apex-peak)"
  />

  <!-- Point au sommet = apex + capteur intelligent -->
  <g filter="url(#apex-soft)">
    <circle cx="32" cy="13" r="3.2" fill="url(#apex-glow)"/>
    <circle cx="32" cy="13" r="5.5" stroke="#34d399" stroke-opacity="0.55" stroke-width="1.2"/>
  </g>

  <!-- Ligne de parking -->
  <path d="M15 51 H49" stroke="rgba(255,255,255,0.25)" stroke-width="1.8" stroke-linecap="round"/>
  <rect x="18" y="51.5" width="7" height="3" rx="1.5" fill="#10b981"/>
  <rect x="28.5" y="51.5" width="7" height="3" rx="1.5" fill="rgba(255,255,255,0.38)"/>
  <rect x="39" y="51.5" width="7" height="3" rx="1.5" fill="rgba(255,255,255,0.22)"/>
</svg>
